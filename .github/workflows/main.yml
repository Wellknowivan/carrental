name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses-dev \
            libffi-dev \
            libssl-dev \
            cmake \
            wget \
            expect \
            android-sdk

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython
          pip install buildozer

      - name: Setup Android SDK
        run: |
          # Создаем структуру папок
          mkdir -p ~/.android
          mkdir -p ~/.buildozer/android/platform/android-sdk
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
          
          # Скачиваем command line tools
          cd ~/.buildozer/android/platform
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools ~/.buildozer/android/platform/android-sdk/
          
          # Добавляем в PATH
          export PATH=$PATH:~/.buildozer/android/platform/android-sdk/cmdline-tools/bin
          
          # Принимаем лицензии через yes
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/bin/sdkmanager --licenses
          
          # Устанавливаем platform-tools
          ~/.buildozer/android/platform/android-sdk/cmdline-tools/bin/sdkmanager "platform-tools" "platforms;android-33"
          
          echo "✅ Android SDK установлен"

      - name: Accept Android SDK licenses
        run: |
          # Создаем папки для лицензий
          mkdir -p ~/.android
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          # Принимаем все лицензии (стандартные хеши)
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.android/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.android/android-sdk-preview-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > ~/.android/intel-android-extras-license
          
          # Копируем в папку buildozer
          cp ~/.android/* ~/.buildozer/android/platform/android-sdk/licenses/ 2>/dev/null || true
          
          echo "✅ Android SDK licenses accepted"

      - name: Build with buildozer
        run: |
          # Устанавливаем переменные окружения
          export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/bin:$ANDROID_HOME/platform-tools
          
          # Запускаем сборку
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: bin/*.apk
          retention-days: 30
