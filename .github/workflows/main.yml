name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses-dev \
            libffi-dev \
            libssl-dev \
            cmake

      - name: Install Python dependencies
        run: |
          pip3 install --upgrade pip
          pip3 install cython
          pip3 install buildozer

      - name: Accept Android SDK licenses
        run: |
          # Создаем папку для лицензий
          mkdir -p "$ANDROID_HOME/licenses" || true
          mkdir -p /home/runner/.android
          
          # Принимаем все лицензии автоматически
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$ANDROID_HOME/licenses/android-sdk-license"
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$ANDROID_HOME/licenses/android-sdk-preview-license"
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > "$ANDROID_HOME/licenses/intel-android-extras-license"
          
          # Копируем в .android тоже
          cp "$ANDROID_HOME/licenses/"* /home/runner/.android/ 2>/dev/null || true
          
          echo "✅ Android SDK licenses accepted"

      - name: Build with buildozer
        run: |
          # Устанавливаем переменные окружения для автоматического принятия лицензий
          export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools
          
          # Запускаем сборку
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: bin/*.apk
          retention-days: 30
